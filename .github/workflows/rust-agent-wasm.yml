# Optional: build WASM calculator and run tests with wasmtime.
# Does not block PRs; run manually via workflow_dispatch.
name: rust-agent-wasm

on:
  workflow_dispatch:

jobs:
  wasm-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasi

      - name: Install wasmtime
        run: |
          curl -sSf https://wasmtime.dev/install.sh | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            rust-agent/target
            rust-agent/wasm/calc-wasm/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-agent-wasm-${{ runner.os }}-${{ hashFiles('rust-agent/Cargo.lock', 'rust-agent/wasm/calc-wasm/Cargo.lock') }}
          restore-keys: rust-agent-wasm-${{ runner.os }}-

      - name: Build WASM calculator
        working-directory: rust-agent/wasm/calc-wasm
        run: |
          cargo build --release --target wasm32-wasi --bin calc-wasm
          mkdir -p ..
          cp target/wasm32-wasi/release/calc_wasm.wasm ../calculator.wasm

      - name: Build rust-agent
        working-directory: rust-agent
        run: cargo build --release

      - name: Test with wasm_calc available
        working-directory: rust-agent
        run: cargo test
